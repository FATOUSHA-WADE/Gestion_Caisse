services:
  - type: web
    name: gestion-caisse
    env: node
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-caisse-db
          property: internalConnectionString
      - key: JWT_SECRET
        generateValue: "openssl rand -base64 32"
      - key: API_BASE_URL
        value: https://gestion-caisse.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    healthCheck:
      path: /health
      interval: 30
      timeout: 15
      retries: 5
      startupDelay: 60

databases:
  - name: gestion-caisse-db
    databaseName: caissedb
    plan: free
    region: oregon
    ipAllowList: []